<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Ketan Parmar | Senior iOS Engineer Portfolio</title>
    <meta name="description" content="Portfolio of Ketan Parmar, a Senior iOS Engineer specializing in Swift, SwiftUI, and scalable mobile architectures." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ketan-parmar.github.io/" />
    <meta property="og:title" content="Ketan Parmar | Senior iOS Engineer Portfolio" />
    <meta property="og:description" content="Senior iOS Engineer specializing in Swift, SwiftUI, and scalable mobile architectures." />
    <meta property="og:image" content="https://ketan-parmar.github.io/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://ketan-parmar.github.io/" />
    <meta property="twitter:title" content="Ketan Parmar | Senior iOS Engineer Portfolio" />
    <meta property="twitter:description" content="Senior iOS Engineer specializing in Swift, SwiftUI, and scalable mobile architectures." />
    <meta property="twitter:image" content="https://ketan-parmar.github.io/og-image.jpg" />
    <style>
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.65, 0, 0.35, 1), visibility 0.6s;
      }

      #preloader.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .loader-logo {
        font-family: serif;
        font-size: 48px;
        font-weight: 900;
        letter-spacing: -0.05em;
        color: #000000;
        font-style: italic;
        position: relative;
      }

      .loader-logo::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 2px;
        background: #000000;
        transform: scaleX(0);
        transform-origin: right;
        animation: loader-line 2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .loader-text {
        font-family: sans-serif;
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: #a3a3a3;
        animation: loader-pulse 2s ease-in-out infinite;
      }

      @keyframes loader-line {
        0% { transform: scaleX(0); transform-origin: left; }
        50% { transform: scaleX(1); transform-origin: left; }
        50.1% { transform: scaleX(1); transform-origin: right; }
        100% { transform: scaleX(0); transform-origin: right; }
      }

      @keyframes loader-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="loader-content">
        <div class="loader-logo">KP</div>
        <div class="loader-text">Senior iOS Engineer</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
